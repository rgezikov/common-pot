name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Run tests
        run: pytest
        env:
          COMPOT_SECRET_KEY: test-secret-key
          COMPOT_TELEGRAM_BOT_TOKEN: test-token
