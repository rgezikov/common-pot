{% extends "base.html" %}
{% block title %}New Pot{% endblock %}
{% block content %}
<h2 class="text-lg font-semibold mb-4">Create a New Pot</h2>
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input type="text" name="name" required autofocus
            class="w-full bg-[var(--input)] rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-accent-500">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Description <span class="text-gray-300">(optional)</span></label>
        <input type="text" name="description"
            class="w-full bg-[var(--input)] rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-accent-500">
    </div>
    <div class="flex gap-3">
        <button type="submit"
            class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 rounded-lg text-sm">
            Create Pot
        </button>
        <a href="{% url 'home' %}"
            class="flex-1 text-center bg-red-700 hover:bg-red-600 text-white font-medium py-3 rounded-lg text-sm">
            Cancel
        </a>
    </div>
</form>
<script>
document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const response = await fetch(window.location.href, {method: 'POST', body: new FormData(this)});
    if (new URL(response.url).pathname !== window.location.pathname) {
        history.back();
    }
});
</script>
{% endblock %}
