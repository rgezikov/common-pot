{% extends "base.html" %}
{% block title %}New Pot{% endblock %}
{% block content %}
<h2 class="text-lg font-semibold mb-4">Create a New Pot</h2>
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input type="text" name="name" required autofocus
            class="w-full bg-gray-100 dark:bg-gray-700 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Description <span class="text-gray-300">(optional)</span></label>
        <input type="text" name="description"
            class="w-full bg-gray-100 dark:bg-gray-700 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg text-base">
        Create Pot
    </button>
</form>
{% endblock %}
