{% extends "base.html" %}
{% block title %}Settings — {{ pot.name }}{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold">Pot Settings</h2>
    <a href="{% url 'pot_detail' pot.invite_token %}" class="text-sm text-gray-400 hover:text-gray-200">← {{ pot.name }}</a>
</div>

<div class="mb-6">
    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wide mb-2">Invite Link</h3>
    <div class="bg-gray-100 dark:bg-gray-800 rounded-lg px-4 py-3 text-sm break-all">
        {{ request.scheme }}://{{ request.get_host }}{% url 'join_pot' pot.invite_token %}
    </div>
</div>

<h3 class="text-sm font-medium text-gray-400 uppercase tracking-wide mb-2">Edit Details</h3>
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input type="text" name="name" required autofocus
            value="{{ pot.name }}"
            class="w-full bg-gray-100 dark:bg-gray-700 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Description <span class="text-gray-400">(optional)</span></label>
        <input type="text" name="description"
            value="{{ pot.description }}"
            class="w-full bg-gray-100 dark:bg-gray-700 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg text-base">
        Save
    </button>
</form>
{% endblock %}
