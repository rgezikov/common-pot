{% extends "base.html" %}
{% block title %}Edit Item{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold">Edit Item</h2>
    <a href="{% url 'list_detail' list.invite_token %}" class="text-sm text-gray-400 hover:text-gray-200">↑ {{ list.name }}</a>
</div>

<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <datalist id="item-suggestions">
            {% for s in suggestions %}<option value="{{ s }}">{% endfor %}
        </datalist>
        <input type="text" name="name" required autofocus list="item-suggestions"
            value="{{ item.name }}"
            class="w-full bg-gray-100 dark:bg-gray-700 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Note <span class="text-gray-400 font-normal">(optional)</span></label>
        <input type="text" name="note"
            value="{{ item.note }}"
            class="w-full bg-gray-100 dark:bg-gray-700 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg text-base">
        Save
    </button>
</form>
{% endblock %}
